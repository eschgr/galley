name: CI

# Run the test suites on every pull request (and on pushes to main) so a
# regression is caught mechanically before merge — independent of whether
# someone remembered to run them locally. Two jobs run in parallel:
#   * Unit tests (Vitest)      — npm test
#   * E2E tests (Playwright)   — headless Chromium against `npm run devapp`
# Mark both as required status checks on `main` to gate merges on a green run.
on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same PR/branch cancels the older in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Only Chromium is exercised (playwright.config.ts), with its OS deps.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      # Playwright starts its own `npm run devapp` server in CI
      # (reuseExistingServer is false when CI is set).
      - run: npm run test:e2e
      # Keep the report + traces (trace: on-first-retry) for a failed run.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
