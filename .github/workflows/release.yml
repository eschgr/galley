name: Release

# Per-run title shown in the Actions tab: "Release v0.2.1" for tag v0.2.1
# (github.ref_name is the pushed tag). Without this, runs show the commit subject.
run-name: Release ${{ github.ref_name }}

# Build the desktop app natively on each OS and publish a GitHub Release whenever
# a version tag (vX.Y.Z) is pushed. macOS builds are produced on macOS runners, so
# this repo never has to be cloned or built on a personal Mac — you just download
# the finished app from the Release.
#
# To cut a release:  npm version patch   (bumps package.json + creates the tag)
#                    git push --follow-tags
# or tag manually:   git tag v0.1.1 && git push origin v0.1.1

on:
  push:
    tags:
      - 'v*'
  # Manual trigger: run the build + macOS signature verify on a branch to confirm
  # a fix before merging. No release is published on a manual run (the `release`
  # job is gated to tag pushes below).
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest → Windows x64; macos-latest → Apple Silicon (arm64).
        # Intel macOS (macos-13) is intentionally omitted — all target machines
        # are Apple Silicon, and the Intel runners are the slowest/scarcest.
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm test

      # --- Windows: Squirrel make, then stage the installer ---
      - name: Build distributables (Windows)
        if: runner.os == 'Windows'
        run: npm run make

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          find out/make -name '*.exe' | while read -r f; do
            cp "$f" "dist/$(basename "$f" | tr ' ' '-')"
          done
          ls -la dist

      # --- macOS: package, DEEP ad-hoc re-sign the bundle, verify, then zip ---
      # The fuse flip + the asar-integrity write into Info.plist invalidate
      # Electron's prebuilt ad-hoc signature. resetAdHocDarwinSignature re-signs
      # the binary but does NOT seal the bundle's Info.plist ("Info.plist not
      # bound"), so the .app is rejected as "damaged" on Apple Silicon (#34). A
      # deep bundle re-sign fixes it; `codesign --verify` then GATES the build so a
      # broken seal fails CI here instead of shipping. (npm run package applies the
      # fuses first; we re-sign after, then zip the signed .app ourselves.)
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: npm run package

      - name: Deep ad-hoc sign + verify + zip (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app="$(find out -maxdepth 2 -name 'Galley.app' -type d | head -1)"
          if [ -z "$app" ]; then echo "Galley.app not found under out/"; exit 1; fi
          echo "Signing: $app"
          codesign --force --deep --sign - "$app"
          # Gate: a valid (even ad-hoc) seal must verify, or the build fails here.
          codesign --verify --deep --verbose=2 "$app"
          echo "Signature verified OK."
          mkdir -p dist
          ver="${GITHUB_REF_NAME//\//-}" # tag (v0.2.2) on a release; sanitised branch on manual runs
          # ditto preserves the signature, symlinks, and resource forks in the zip.
          ditto -c -k --sequesterRsrc --keepParent "$app" "dist/Galley-darwin-arm64-${ver}.zip"
          ls -la dist

      - uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.os }}
          path: dist/
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    # Publish only on a real version tag — a manual workflow_dispatch run builds
    # and verifies the macOS signature but does NOT create a release.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - run: ls -la dist

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Galley ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: dist/**/*
          # "What's Changed" auto-built from PRs merged since the previous tag.
          generate_release_notes: true
