<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy: lock the renderer down. No remote code, no inline
      script. 'unsafe-inline' for styles is permitted because KaTeX and the
      preview inject inline style attributes. Tighten further once the styling
      approach is settled.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;"
    />
    <title>mdtool</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer.tsx"></script>
  </body>
</html>
