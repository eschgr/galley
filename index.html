<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy: lock the renderer down. No remote code, no inline
      script. 'unsafe-inline' for styles is permitted because KaTeX and the
      preview inject inline style attributes.

      img-src allows http: and https: so Markdown can display whatever images a
      doc references — including non-TLS / LAN hosts (#25) — plus data: (inline
      base64) and 'self'. This is a local document viewer, not a web browser, so
      showing referenced images is the whole point; the only cost is that a
      remote image reveals the viewer's IP to its host. script-src and
      default-src stay 'self' — code execution is NOT loosened.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; font-src 'self' data:;"
    />
    <title>Galley</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer.tsx"></script>
  </body>
</html>
